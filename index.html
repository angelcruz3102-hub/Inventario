  <nav id="tab-nav">
    <button class="tab-btn active" data-tab="registro">📝 Registro</button>
    <button class="tab-btn" data-tab="dashboard">📊 Dashboard y Búsqueda</button>
    <button class="tab-btn" data-tab="reportes">📄 Reportes</button>
  </nav>

  <!-- Barra de filtros común (visible en Dashboard y Reportes) -->
  <div id="filters-bar" class="card" style="display:none;">
    <div class="filter-row">
      <input type="text" id="filter-piso" placeholder="Piso" list="datalist-filter-pisos">
      <datalist id="datalist-filter-pisos"></datalist>
      <input type="text" id="filter-departamento" placeholder="Departamento" list="datalist-filter-deptos">
      <datalist id="datalist-filter-deptos"></datalist>
      <input type="text" id="filter-area" placeholder="Área" list="datalist-filter-areas">
      <datalist id="datalist-filter-areas"></datalist>
      <input type="text" id="filter-responsable" placeholder="Responsable" list="datalist-filter-resp">
      <datalist id="datalist-filter-resp"></datalist>
      <button id="btn-clear-filters" class="btn btn-secondary">Limpiar</button>
    </div>
  </div>

  <main>
    <!-- Pestaña Registro -->
    <section id="tab-registro" class="tab-content active">
      <div class="card form-section">
        <h2>📌 Nueva Estación de Trabajo</h2>
        <fieldset class="fieldset-ubicacion">
          <legend>Ubicación</legend>
          <div class="form-row">
            <div class="form-group">
              <label for="edificio">Edificio *</label>
              <select id="edificio" required>
                <option value="">Seleccione...</option>
                <option value="Edificio I (Viejo)">Edificio I (Viejo)</option>
                <option value="Edificio II (Nuevo)">Edificio II (Nuevo)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="piso">Piso / Nivel</label>
              <input type="text" id="piso" list="datalist-pisos" placeholder="Ej: 1, 2, Sótano...">
              <datalist id="datalist-pisos"></datalist>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="departamento">Departamento *</label>
              <input type="text" id="departamento" list="datalist-departamentos" placeholder="Ej: Recursos Humanos" required>
              <datalist id="datalist-departamentos"></datalist>
            </div>
            <div class="form-group">
              <label for="area">Área</label>
              <input type="text" id="area" list="datalist-areas" placeholder="Ej: Contabilidad">
              <datalist id="datalist-areas"></datalist>
            </div>
          </div>
        </fieldset>
        <div class="form-row">
          <div class="form-group full-width">
            <label for="responsable">Responsable *</label>
            <input type="text" id="responsable" placeholder="Nombre completo del responsable" required>
          </div>
        </div>

        <fieldset class="fieldset-equipos">
          <legend>Equipos Asignados</legend>
          <div class="equipos-form-inline">
            <select id="tipo-equipo">
              <option value="">Tipo...</option>
              <option value="Computadora Escritorio">Computadora Escritorio</option>
              <option value="Laptop">Laptop</option>
              <option value="Monitor">Monitor</option>
              <option value="Impresora">Impresora</option>
              <option value="UPS">UPS</option>
              <option value="Servidor">Servidor</option>
              <option value="Switch">Switch</option>
              <option value="Router">Router</option>
              <option value="Teléfono IP">Teléfono IP</option>
              <option value="Otro">Otro</option>
            </select>
            <input type="text" id="marca-equipo" placeholder="Marca">
            <input type="text" id="modelo-equipo" placeholder="Modelo">
            <input type="text" id="serie-equipo" placeholder="Serie">
            <input type="text" id="activo-equipo" placeholder="Activo Fijo">
            <button type="button" id="btn-agregar-equipo" class="btn btn-add">+ Agregar</button>
          </div>
          <div class="equipos-temp-list" id="equipos-temp-list">
            <p class="placeholder-text">No hay equipos agregados aún.</p>
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="button" id="btn-limpiar-form" class="btn btn-secondary">🧹 Limpiar Formulario</button>
          <button type="button" id="btn-guardar" class="btn btn-primary">💾 Guardar Estación</button>
        </div>
        <div id="form-status" class="status-message"></div>
      </div>
    </section>

    <!-- Pestaña Dashboard -->
    <section id="tab-dashboard" class="tab-content">
      <div id="stats-container" class="stats-grid"></div>
      <div id="table-container-dashboard" class="table-wrapper"></div>
    </section>

    <!-- Pestaña Reportes -->
    <section id="tab-reportes" class="tab-content">
      <div class="report-actions">
        <button id="btn-export-csv" class="btn btn-primary">📥 Exportar a CSV</button>
      </div>
      <div id="table-container-reportes" class="table-wrapper"></div>
    </section>
  </main>

  <footer>
    <p>INDRHI &copy; <span id="year"></span> - Sistema de Inventario Tecnológico v1.0</p>
  </footer>
